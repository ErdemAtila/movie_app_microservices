<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Microservice Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">U</div>
                <h1>UsersMS</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="users">
                    <span class="nav-icon">👤</span> Users
                </a>
                <a href="#" class="nav-item" data-view="roles">
                    <span class="nav-icon">🔑</span> Roles
                </a>
                <a href="#" class="nav-item" data-view="groups">
                    <span class="nav-icon">👥</span> Groups
                </a>
                <a href="#" class="nav-item" data-view="movies">
                    <span class="nav-icon">🎬</span> Movies
                </a>
                <a href="#" class="nav-item" data-view="directors">
                    <span class="nav-icon">🎭</span> Directors
                </a>
                <a href="#" class="nav-item" data-view="genres">
                    <span class="nav-icon">🏷️</span> Genres
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="system-status">
                    <span class="status-dot"></span> API Connected
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-search">
                    <input type="text" id="global-search" placeholder="Search anything...">
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" id="add-item-btn">+ New User</button>
                    <button class="btn btn-secondary" id="register-btn" style="background-color: var(--card-bg); border: 1px solid var(--border);">Register</button>
                    <button class="btn btn-secondary" id="login-btn" style="background-color: var(--card-bg); border: 1px solid var(--border);">Login</button>
                    <div class="user-profile" id="user-profile" style="display: none;">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="Admin" id="user-avatar">
                    </div>
                </div>
            </header>

            <section class="overview-stats">
                <div class="stat-card">
                    <div class="stat-label">Total Users</div>
                    <div class="stat-value" id="stat-total-users">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Active Users</div>
                    <div class="stat-value" id="stat-active-users">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg. Score</div>
                    <div class="stat-value" id="stat-avg-score">0.0</div>
                </div>
            </section>

            <div class="content-body" id="main-display">
                <div class="loading-overlay">
                    <div class="spinner"></div>
                    <p>Fetching data from microservice...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-backdrop"></div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
